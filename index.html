<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>VOOTIFY</title>
    <meta name="description" content="VOOTIFY - Votre application de musique et radio en streaming.">
    <meta name="author" content="Vootify" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <!-- PWA -->
    <meta name="theme-color" content="#0b0e14" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vootify" />
    <link rel="apple-touch-icon" href="/pwa-icon-192.png" />
    <link rel="apple-touch-startup-image" href="/splash-screen.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Preconnect for critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://whjjlqznrwroiwrpmoum.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://c.saavncdn.com" />
    <link rel="dns-prefetch" href="https://cdns-images.dzcdn.net" />

    <!-- Preload font CSS for faster text rendering -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" /></noscript>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="VOOTIFY" />
    <meta property="og:description" content="VOOTIFY - Votre application de musique et radio en streaming." />
    <meta property="og:image" content="/pwa-icon-512.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="VOOTIFY" />
    <meta name="twitter:description" content="VOOTIFY - Votre application de musique et radio en streaming." />
    <meta name="twitter:image" content="/pwa-icon-512.png" />
  </head>

  <body>
    <div id="root">
      <!-- Inline skeleton to eliminate white flash before React hydrates -->
      <div style="min-height:100vh;background:#0b0e14;display:flex;align-items:center;justify-content:center">
        <div style="width:96px;height:96px;border-radius:28px;background:#111622;animation:pulse 1.5s ease-in-out infinite"></div>
      </div>
      <style>@keyframes pulse{0%,100%{opacity:.6}50%{opacity:.3}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
